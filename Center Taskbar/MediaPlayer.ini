[Metadata]
Name = WinTaskical
Author = Meti0X7CB
Information = "The Taskbar you derverse on Win 11"
Version = 3.1
License = GNU General Public License v3.0

[Rainmeter]
Update = 30
AccurateText = 1
DefaultAlwaysOnTop = -2
DefaultDraggable = 0
DefaultAutoSelectScreen = 0
DefaultWindowY = 0B
DefaultAnchorY = 100%
OnRefreshAction = [!WriteKeyValue Variables Scale "[AppBar:MonitorScale()]" "#@#Variables.inc"]

[Variables]
@include ="#@#Variables.inc"
Highlight = [WindowsAccentColor]
Height = 48
FrostLevel = Acrylic
PlayerId = "Active"
@include2 = "#@#MeasureBands.inc"

[MeasureWindowsScaling]
Measure = Calc
Formula = [AppBar:MonitorScale()]
OnChangeAction = [!WriteKeyValue Variables Scale "[AppBar:MonitorScale()]" "#@#Variables.inc"][!Refresh]
DynamicVariables = 1
UpdateDivider = 10

[WindowsAccentColor]
Measure = Plugin
Plugin = SysColor
ColorType = Accent

[AppBar]
Measure = Plugin
Plugin = AppBar
RequiredSpace = 0
DPIAware = 1
DynamicVariables = 1

[MeasureWindowsTheme]
Measure = Registry
RegHKey = HKEY_CURRENT_USER
RegKey = Software\\Microsoft\\Windows\\CurrentVersion\\Themes\\Personalize
RegValue = AppsUseLightTheme
IfCondition = MeasureWindowsTheme = 1
IfConditionMode = 1
IfTrueAction = [!SetVariable Theme "Light4"][!SetVariable Color "28,28,28"][!SetVariable SubColor "105,105,105"][!WriteKeyValue Variables Theme "Light4" "#@#Variables.inc"][!WriteKeyValue Variables Color "28,28,28" "#@#Variables.inc"][!WriteKeyValue Variables SubColor "105,105,105" "#@#Variables.inc"]
IfFalseAction = [!SetVariable Theme "Dark4"][!SetVariable Color "222,222,222"][!SetVariable SubColor "170,170,170"][!WriteKeyValue Variables Theme "Dark4" "#@#Variables.inc"][!WriteKeyValue Variables Color "222,222,222" "#@#Variables.inc"][!WriteKeyValue Variables SubColor "170,170,170" "#@#Variables.inc"]
OnChangeAction = [!Refresh]
DynamicVariables = 1

[FrostedGlass]
Measure = Plugin
Plugin = FrostedGlass
Type = #FrostLevel#
Border = None
Corner = None
Backdrop = #Theme#
BorderVisible = 0
DynamicVariables = 1

[MeterCanvas]
Meter = Shape
Shape = Rectangle 0,0,(#ScreenAreaWidth#*#Scale#),(#Height#*#Scale#),0 | Fill Color 0,0,0,1 | StrokeWidth 0
DynamicVariables = 1

[MeasureStatus]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Status
PlayerId = #PlayerId#
IfCondition = MeasureStatus = 1
IfTrueAction = [!ShowMeterGroup "Active"]
IfFalseAction = [!HideMeterGroup "Active"]

[MeasureCover]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Cover
PlayerId = #PlayerId#
DefaultPath = "#@#Default.png"
DynamicVariables = 1

[MeterCoverContainer]
Meter = Shape
Shape = Rectangle 0,0,(35*#Scale#),(35*#Scale#),5 | Fill Color 0,0,0,255 | StrokeWidth 0
X = (120*#Scale#)
Y = ((#Height#*#Scale#)-(35*#Scale#))/2

[MeterCover]
Meter = Image
MeasureName = MeasureCover
W = (35*#Scale#)
H = (35*#Scale#)
Container = MeterCoverContainer
PreserveAspectRatio = 2
DynamicVariables = 1
Group = Active

[MeasureTitle]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Title
PlayerId = #PlayerId#
DynamicVariables = 1
Substitute = "0":""

[MeterTitle]
Meter = String
MeasureName = MeasureTitle
X = (175*#Scale#)
Y = (5*#Scale#)
W = (200*#Scale#)
FontColor = #Color#
FontSize = (10*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
ClipString = 1
StringAlign = LeftTop
DynamicVariables = 1
Group = Active

[MeasureArtist]
Measure = Plugin
Plugin = WebNowPlaying
PlayerType = Artist
PlayerId = #PlayerId#
DynamicVariables = 1
Substitute = "0":""

[MeterArtist]
Meter = String
MeasureName = MeasureArtist
X = (175*#Scale#)
Y = (23*#Scale#)
W = (200*#Scale#)
FontColor = #Color#
FontSize = (10*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
ClipString = 1
StringAlign = LeftTop
DynamicVariables = 1
Group = Active

[MeterBands]
Meter = Shape
Shape   = Rectangle (30+((6*0)*#Scale#)),(((24*[MeasureBand0]*#Scale#)/-2)+(48*#Scale#)/2),(2*#Scale#),(24*[MeasureBand0]*#Scale#),0,0 | Extend Style
Shape2  = Rectangle (30+((6*1)*#Scale#)),(((24*[MeasureBand1]*#Scale#)/-2)+(48*#Scale#)/2),(2*#Scale#),(24*[MeasureBand1]*#Scale#),0,0 | Extend Style
Shape3  = Rectangle (30+((6*2)*#Scale#)),(((24*[MeasureBand2]*#Scale#)/-2)+(48*#Scale#)/2),(2*#Scale#),(24*[MeasureBand2]*#Scale#),0,0 | Extend Style
Shape4  = Rectangle (30+((6*3)*#Scale#)),(((24*[MeasureBand3]*#Scale#)/-2)+(48*#Scale#)/2),(2*#Scale#),(24*[MeasureBand3]*#Scale#),0,0 | Extend Style
Shape5  = Rectangle (30+((6*4)*#Scale#)),(((24*[MeasureBand4]*#Scale#)/-2)+(48*#Scale#)/2),(2*#Scale#),(24*[MeasureBand4]*#Scale#),0,0 | Extend Style
Shape6  = Rectangle (30+((6*5)*#Scale#)),(((24*[MeasureBand5]*#Scale#)/-2)+(48*#Scale#)/2),(2*#Scale#),(24*[MeasureBand5]*#Scale#),0,0 | Extend Style
Shape7  = Rectangle (30+((6*6)*#Scale#)),(((24*[MeasureBand6]*#Scale#)/-2)+(48*#Scale#)/2),(2*#Scale#),(24*[MeasureBand6]*#Scale#),0,0 | Extend Style
Shape8  = Rectangle (30+((6*7)*#Scale#)),(((24*[MeasureBand7]*#Scale#)/-2)+(48*#Scale#)/2),(2*#Scale#),(24*[MeasureBand7]*#Scale#),0,0 | Extend Style
Shape9  = Rectangle (30+((6*8)*#Scale#)),(((24*[MeasureBand8]*#Scale#)/-2)+(48*#Scale#)/2),(2*#Scale#),(24*[MeasureBand8]*#Scale#),0,0 | Extend Style
Shape10 = Rectangle (30+((6*9)*#Scale#)),(((24*[MeasureBand9]*#Scale#)/-2)+(48*#Scale#)/2),(2*#Scale#),(24*[MeasureBand9]*#Scale#),0,0 | Extend Style
Shape11 = Rectangle (30+((6*10)*#Scale#)),(((24*[MeasureBand10]*#Scale#)/-2)+(48*#Scale#)/2),(2*#Scale#),(24*[MeasureBand10]*#Scale#),0,0 | Extend Style
Shape12 = Rectangle (30+((6*11)*#Scale#)),(((24*[MeasureBand11]*#Scale#)/-2)+(48*#Scale#)/2),(2*#Scale#),(24*[MeasureBand11]*#Scale#),0,0 | Extend Style
Shape13 = Rectangle (30+((6*12)*#Scale#)),(((24*[MeasureBand12]*#Scale#)/-2)+(48*#Scale#)/2),(2*#Scale#),(24*[MeasureBand12]*#Scale#),0,0 | Extend Style
Shape14 = Rectangle (30+((6*13)*#Scale#)),(((24*[MeasureBand13]*#Scale#)/-2)+(48*#Scale#)/2),(2*#Scale#),(24*[MeasureBand13]*#Scale#),0,0 | Extend Style
Style = Fill Color #Color# | StrokeWidth 0
AntiAlias = 1
DynamicVariables = 1