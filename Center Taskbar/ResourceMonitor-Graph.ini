[Metadata]
Name = WinTaskical
Author = Meti0X7CB
Information = "The Taskbar you derverse on Win 11"
Version = 3.1
License = GNU General Public License v3.0

[Rainmeter]
Update = 30
AccurateText = 1
DefaultAlwaysOnTop = -2
DefaultDraggable = 0
DefaultAutoSelectScreen = 0
DefaultWindowY = 0B
DefaultAnchorY = 100%
OnRefreshAction = [!WriteKeyValue Variables Scale "[AppBar:MonitorScale()]" "#@#Variables.inc"]

[Variables]
@include="#@#Variables.inc"
Height = 48
Highlight = [WindowsAccentColor]
SSDGraphMax = 1000000
NETGraphMax = 1000000
FrostLevel = Acrylic

[WindowsAccentColor]
Measure = Plugin
Plugin = SysColor
ColorType = Accent

[AppBar]
Measure = Plugin
Plugin = AppBar
RequiredSpace = 0
DPIAware = 1
DynamicVariables = 1

[MeasureWindowsTheme]
Measure = Registry
RegHKey = HKEY_CURRENT_USER
RegKey = Software\\Microsoft\\Windows\\CurrentVersion\\Themes\\Personalize
RegValue = AppsUseLightTheme
IfCondition = MeasureWindowsTheme = 1
IfConditionMode = 1
IfTrueAction = [!SetVariable Theme "Light4"][!SetVariable Color "28,28,28"][!SetVariable SubColor "105,105,105"][!WriteKeyValue Variables Theme "Light4" "#@#Variables.inc"][!WriteKeyValue Variables Color "28,28,28" "#@#Variables.inc"][!WriteKeyValue Variables SubColor "105,105,105" "#@#Variables.inc"]
IfFalseAction = [!SetVariable Theme "Dark4"][!SetVariable Color "222,222,222"][!SetVariable SubColor "170,170,170"][!WriteKeyValue Variables Theme "Dark4" "#@#Variables.inc"][!WriteKeyValue Variables Color "222,222,222" "#@#Variables.inc"][!WriteKeyValue Variables SubColor "170,170,170" "#@#Variables.inc"]
OnChangeAction = [!Refresh]
DynamicVariables = 1

[MeasureWindowsScaling]
Measure = Calc
Formula = [AppBar:MonitorScale()]
OnChangeAction = [!WriteKeyValue Variables Scale "[AppBar:MonitorScale()]" "#@#Variables.inc"][!Refresh]
DynamicVariables = 1
UpdateDivider = 10

[FrostedGlass]
Measure = Plugin
Plugin = FrostedGlass
Type = #FrostLevel#
Border = None
Corner = None
Backdrop = #Theme#
BorderVisible = 0
DynamicVariables = 1

[MeterCanvas]
Meter = Shape
Shape = Rectangle 0,0,(#ScreenAreaWidth#*#Scale#),(#Height#*#Scale#),0 | Fill Color 0,0,0,1 | StrokeWidth 0
DynamicVariables = 1

[MeterNETIcon]
Meter = Image
ImageName = "#@#NET.png"
X = ([MeterSSDIcon:X]+(80*#Scale#))
Y = ((#Height#*#Scale#)-(20*#Scale#))/2
W = (20*#Scale#)
H = (20*#Scale#)
ImageTint = #Color#
AntiAlias = 1
DynamicVariables = 1

[MeasureNET]
Measure = NetTotal
UpdateDivider = 20

[MeasureNETScaled]
Measure = Calc
Formula = (MeasureNET / #NETGraphMax# * 100)
MaxValue = 100
MinValue = 0
DynamicVariables = 1
UpdateDivider = 20

[MeasureNETAutoMax]
Measure = Calc
Formula = MeasureNET
IfCondition = (MeasureNETAutoMax >= #NETGraphMax#) && (#NETGraphMax# < 1000000000)
IfTrueAction = [!SetVariable NETGraphMax "(#NETGraphMax#*2>1000000000?1000000000:(#NETGraphMax#*2))"][!UpdateMeasure MeasureNETScaled][!Redraw]
DynamicVariables = 1
UpdateDivider = 20

[MeterNETGBG]
Meter = Shape
Shape = Rectangle ([MeterNETIcon:X]+(25*#Scale#)),((#Height#*#Scale#)-(25*#Scale#))/2,(40*#Scale#),(25*#Scale#),(2*#Scale#),(2*#Scale#) | Fill Color #SubColor#,70 | StrokeWidth 0
AntiAlias = 1
DynamicVariables = 1

[MeterNETGraph]
Meter = Histogram
MeasureName = MeasureNETScaled
X = ([MeterNETIcon:X]+(25*#Scale#))
Y = ((#Height#*#Scale#)-(25*#Scale#))/2
W = (40*#Scale#)
H = (25*#Scale#)
SolidColor = 0,0,0,1
PrimaryColor = #Color#,170
AntiAlias = 1
DynamicVariables = 1
UpdateDivider = 20
[MeterSSDIcon]
Meter = Image
ImageName = "#@#SSD.png"
X = ([MeterRAMIcon:X]+(80*#Scale#))
Y = ((#Height#*#Scale#)-(20*#Scale#))/2
W = (20*#Scale#)
H = (20*#Scale#)
ImageTint = #Color#
AntiAlias = 1
DynamicVariables = 1

[MeasureSSD]
Measure = Plugin
Plugin = UsageMonitor
Category = Process
Counter = IO Data Bytes/sec
UpdateDivider = 20

[MeasureSSDScaled]
Measure = Calc
Formula = (MeasureSSD / #SSDGraphMax# * 100)
MaxValue = 100
MinValue = 0
DynamicVariables = 1
UpdateDivider = 20

[MeasureSSDAutoMax]
Measure = Calc
Formula = MeasureSSD
IfCondition = (MeasureSSDAutoMax >= #SSDGraphMax#) && (#SSDGraphMax# < 1000000000)
IfTrueAction = [!SetVariable SSDGraphMax "(#SSDGraphMax#*2>1000000000?1000000000:(#SSDGraphMax#*2))"][!UpdateMeasure MeasureSSDScaled][!Redraw]
DynamicVariables = 1
UpdateDivider = 20

[MeterSSDGBG]
Meter = Shape
Shape = Rectangle ([MeterSSDIcon:X]+(25*#Scale#)),((#Height#*#Scale#)-(25*#Scale#))/2,(40*#Scale#),(25*#Scale#),(2*#Scale#),(2*#Scale#) | Fill Color #SubColor#,70 | StrokeWidth 0
AntiAlias = 1
DynamicVariables = 1

[MeterSSDGraph]
Meter = Histogram
MeasureName = MeasureSSDScaled
X = ([MeterSSDIcon:X]+(25*#Scale#))
Y = ((#Height#*#Scale#)-(25*#Scale#))/2
W = (40*#Scale#)
H = (25*#Scale#)
SolidColor = 0,0,0,1
PrimaryColor = #Color#,170
AntiAlias = 1
DynamicVariables = 1
UpdateDivider = 20

[MeterCPUIcon]
Meter = Image
ImageName = "#@#CPU.png"
X = (20*#Scale#)
Y = ((#Height#*#Scale#)-(20*#Scale#))/2
W = (20*#Scale#)
H = (20*#Scale#)
ImageTint = #Color#
AntiAlias = 1
DynamicVariables = 1

[MeasureCPU]
Measure = Plugin
Plugin = UsageMonitor
Category = Processor Information
Counter = % Processor Utility
Name = _Total

[MeasureCPUScaled]
Measure = Calc
Formula = (MeasureCPU > 100 ? 100 : MeasureCPU)
MaxValue = 100

[MeterCPUGBG]
Meter = Shape
Shape = Rectangle ([MeterCPUIcon:X]+(25*#Scale#)),((#Height#*#Scale#)-(25*#Scale#))/2,(40*#Scale#),(25*#Scale#),(2*#Scale#),(2*#Scale#) | Fill Color #SubColor#,70 | StrokeWidth 0
AntiAlias = 1
DynamicVariables = 1

[MeterCPUGraph]
Meter = Histogram
MeasureName = MeasureCPUScaled
X = ([MeterCPUIcon:X]+(25*#Scale#))
Y = ((#Height#*#Scale#)-(25*#Scale#))/2
W = (40*#Scale#)
H = (25*#Scale#)
SolidColor = 0,0,0,1
PrimaryColor = #Color#,170
AntiAlias = 1
DynamicVariables = 1
UpdateDivider = 20

[MeterGPUIcon]
Meter = Image
ImageName = "#@#GPU.png"
X = ([MeterCPUIcon:X]+(80*#Scale#))
Y = ((#Height#*#Scale#)-(20*#Scale#))/2
W = (20*#Scale#)
H = (20*#Scale#)
ImageTint = #Color#
AntiAlias = 1
DynamicVariables = 1

[MeasureGPU]
Measure = Plugin
Plugin = NativeHardwareMonitor
Sensor = Load
UpdateDivider = 20

[MeasureGPUScaled]
Measure = Calc
Formula = (MeasureGPU > 100 ? 100 : MeasureGPU)
MaxValue = 100

[MeterGPUGBG]
Meter = Shape
Shape = Rectangle ([MeterGPUIcon:X]+(25*#Scale#)),((#Height#*#Scale#)-(25*#Scale#))/2,(40*#Scale#),(25*#Scale#),(2*#Scale#),(2*#Scale#) | Fill Color #SubColor#,70 | StrokeWidth 0
AntiAlias = 1
DynamicVariables = 1

[MeterGPUGraph]
Meter = Histogram
MeasureName = MeasureGPUScaled
X = ([MeterGPUIcon:X]+(25*#Scale#))
Y = ((#Height#*#Scale#)-(25*#Scale#))/2
W = (40*#Scale#)
H = (25*#Scale#)
SolidColor = 0,0,0,1
PrimaryColor = #Color#,170
AntiAlias = 1
DynamicVariables = 1
UpdateDivider = 20

[MeterRAMIcon]
Meter = Image
ImageName = "#@#RAM.png"
X = ([MeterGPUIcon:X]+(80*#Scale#))
Y = ((#Height#*#Scale#)-(20*#Scale#))/2
W = (20*#Scale#)
H = (20*#Scale#)
ImageTint = #Color#
AntiAlias = 1
DynamicVariables = 1

[MeasureRAM]
Measure = PhysicalMemory
OnUpdateAction = [!SetVariable RAMUsage "(Round((([MeasureRAM:]/[MeasureRAM:MaxValue])*100),0))"]

[MeterRAMGBG]
Meter = Shape
Shape = Rectangle ([MeterRAMIcon:X]+(25*#Scale#)),((#Height#*#Scale#)-(25*#Scale#))/2,(40*#Scale#),(25*#Scale#),(2*#Scale#),(2*#Scale#) | Fill Color #SubColor#,70 | StrokeWidth 0
AntiAlias = 1
DynamicVariables = 1

[MeterRAMGraph]
Meter = Histogram
MeasureName = MeasureRAM
X = ([MeterRAMIcon:X]+(25*#Scale#))
Y = ((#Height#*#Scale#)-(25*#Scale#))/2
W = (40*#Scale#)
H = (25*#Scale#)
SolidColor = 0,0,0,1
PrimaryColor = #Color#,170
AntiAlias = 1
DynamicVariables = 1
UpdateDivider = 20
