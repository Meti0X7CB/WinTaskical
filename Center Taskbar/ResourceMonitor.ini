[Metadata]
Name = WinTaskical
Author = Meti0X7CB
Information = "The Taskbar you derverse on Win 11"
Version = 3.1
License = GNU General Public License v3.0

[Rainmeter]
Update = 30
AccurateText = 1
DefaultAlwaysOnTop = -2
DefaultDraggable = 0
DefaultAutoSelectScreen = 0
DefaultWindowY = 0B
DefaultAnchorY = 100%
OnRefreshAction = [!WriteKeyValue Variables Scale "[AppBar:MonitorScale()]" "#@#Variables.inc"]

[Variables]
@include="#@#Variables.inc"
Height = 48
Highlight = [WindowsAccentColor]
FrostLevel = Acrylic

[WindowsAccentColor]
Measure = Plugin
Plugin = SysColor
ColorType = Accent

[AppBar]
Measure = Plugin
Plugin = AppBar
RequiredSpace = 0
DPIAware = 1
DynamicVariables = 1

[MeasureWindowsTheme]
Measure = Registry
RegHKey = HKEY_CURRENT_USER
RegKey = Software\\Microsoft\\Windows\\CurrentVersion\\Themes\\Personalize
RegValue = AppsUseLightTheme
IfCondition = MeasureWindowsTheme = 1
IfConditionMode = 1
IfTrueAction = [!SetVariable Theme "Light4"][!SetVariable Color "28,28,28"][!SetVariable SubColor "105,105,105"][!WriteKeyValue Variables Theme "Light4" "#@#Variables.inc"][!WriteKeyValue Variables Color "28,28,28" "#@#Variables.inc"][!WriteKeyValue Variables SubColor "105,105,105" "#@#Variables.inc"]
IfFalseAction = [!SetVariable Theme "Dark4"][!SetVariable Color "222,222,222"][!SetVariable SubColor "170,170,170"][!WriteKeyValue Variables Theme "Dark4" "#@#Variables.inc"][!WriteKeyValue Variables Color "222,222,222" "#@#Variables.inc"][!WriteKeyValue Variables SubColor "170,170,170" "#@#Variables.inc"]
OnChangeAction = [!Refresh]
DynamicVariables = 1

[MeasureWindowsScaling]
Measure = Calc
Formula = [AppBar:MonitorScale()]
OnChangeAction = [!WriteKeyValue Variables Scale "[AppBar:MonitorScale()]" "#@#Variables.inc"][!Refresh]
DynamicVariables = 1
UpdateDivider = 10

[FrostedGlass]
Measure = Plugin
Plugin = FrostedGlass
Type = #FrostLevel#
Border = None
Corner = None
Backdrop = #Theme#
BorderVisible = 0
DynamicVariables = 1

[MeterCanvas]
Meter = Shape
Shape = Rectangle 0,0,(#ScreenAreaWidth#*#Scale#),(#Height#*#Scale#),0 | Fill Color 0,0,0,1 | StrokeWidth 0
DynamicVariables = 1

[MeterCPUIcon]
Meter = Image
ImageName = "#@#CPU.png"
X = (20*#Scale#)
Y = ((#Height#*#Scale#)-(20*#Scale#))/2
W = (20*#Scale#)
H = (20*#Scale#)
ImageTint = #Color#
AntiAlias = 1

[MeasureCPU]
Measure = Plugin
Plugin = UsageMonitor
Category = Processor Information
Counter = % Processor Utility
Name = _Total

[MeasureCPUScaled]
Measure = Calc
Formula = (MeasureCPU > 100 ? 100 : MeasureCPU)
MaxValue = 100

[MeterCPUText]
Meter = String
MeasureName = MeasureCPUScaled
Text = %1
X = ([MeterCPUIcon:X]+(30*#Scale#))
Y = ((#Height#*#Scale#)-(20*#Scale#))/2
FontColor = #Color#
FontSize = (10*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
DynamicVariables = 1

[MeterCPUUnit]
Meter = String
Text = %
X = R
Y = (21*#Scale#)
FontColor = #SubColor#
FontSize = (5*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
DynamicVariables = 1

[MeterGPUIcon]
Meter = Image
ImageName = "#@#GPU.png"
X = ([MeterCPUIcon:X]+(70*#Scale#))
Y = ((#Height#*#Scale#)-(20*#Scale#))/2
W = (20*#Scale#)
H = (20*#Scale#)
ImageTint = #Color#
AntiAlias = 1

[MeasureGPU]
Measure = Plugin
Plugin = NativeHardwareMonitor
Sensor = Load
UpdateDivider = 20

[MeasureGPUScaled]
Measure = Calc
Formula = (MeasureGPU > 100 ? 100 : MeasureGPU)
MaxValue = 100

[MeterGPUText]
Meter = String
MeasureName = MeasureGPUScaled
X = ([MeterGPUIcon:X]+(30*#Scale#))
Y = ((#Height#*#Scale#)-(20*#Scale#))/2
FontColor = #Color#
FontSize = (10*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
DynamicVariables = 1

[MeterGPUUnit]
Meter = String
Text = %
X = R
Y = (21*#Scale#)
FontColor = #SubColor#
FontSize = (5*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
DynamicVariables = 1

[MeterRAMIcon]
Meter = Image
ImageName = "#@#RAM.png"
X = ([MeterGPUIcon:X]+(70*#Scale#))
Y = ((#Height#*#Scale#)-(20*#Scale#))/2
W = (20*#Scale#)
H = (20*#Scale#)
ImageTint = #Color#
AntiAlias = 1

[MeasureRAM]
Measure = PhysicalMemory
OnUpdateAction = [!SetVariable RAMUsage "(Round((([MeasureRAM:]/[MeasureRAM:MaxValue])*100),0))"]

[MeterRAMText]
Meter = String
Text = #RAMUsage#
X = ([MeterRAMIcon:X]+(30*#Scale#))
Y = ((#Height#*#Scale#)-(20*#Scale#))/2
FontColor = #Color#
FontSize = (10*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
DynamicVariables = 1

[MeterRAMUnit]
Meter = String
Text = %
X = R
Y = (21*#Scale#)
FontColor = #SubColor#
FontSize = (5*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
DynamicVariables = 1

[MeterSSDIcon]
Meter = Image
ImageName = "#@#SSD.png"
X = ([MeterRAMIcon:X]+(70*#Scale#))
Y = ((#Height#*#Scale#)-(20*#Scale#))/2
W = (20*#Scale#)
H = (20*#Scale#)
ImageTint = #Color#
AntiAlias = 1

[MeasureSSDRead]
Measure = Plugin
Plugin = UsageMonitor
Category = Process
Counter = IO Read Bytes/sec
UpdateDivider = 20

[MeterSSDReadText]
Meter = String
Text = [MeasureSSDRead:/1000000,0]
X = ([MeterSSDIcon:X]+(30*#Scale#))
Y = ((#Height#*#Scale#)-(30*#Scale#))/3
FontColor = #Color#
FontSize = (10*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
DynamicVariables = 1

[MeterSSDReadUnit]
Meter = String
Text = MB/s
X = R
Y = (13*#Scale#)
FontColor = #SubColor#
FontSize = (5*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
DynamicVariables = 1

[MeasureSSDWrite]
Measure = Plugin
Plugin = UsageMonitor
Category = Process
Counter = IO Write Bytes/sec
UpdateDivider = 20

[MeterSSDWriteText]
Meter = String
Text = [MeasureSSDWrite:/1000000,0]
X = ([MeterSSDIcon:X]+(30*#Scale#))
Y = (23.5*#Scale#)
FontColor = #Color#
FontSize = (10*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
DynamicVariables = 1

[MeterSSDWriteUnit]
Meter = String
Text = MB/s
X = R
Y = (30*#Scale#)
FontColor = #SubColor#
FontSize = (5*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
DynamicVariables = 1

[MeterNETIcon]
Meter = Image
ImageName = "#@#NET.png"
X = ([MeterSSDIcon:X]+(80*#Scale#))
Y = ((#Height#*#Scale#)-(20*#Scale#))/2
W = (20*#Scale#)
H = (20*#Scale#)
ImageTint = #Color#
AntiAlias = 1

[MeasureNETOut]
Measure = NetOut
UpdateDivider = 20

[MeasureNETOutText]
Meter = String
Text = [MeasureNETOut:/1000000,0]
X = ([MeterNETIcon:X]+(30*#Scale#))
Y = ((#Height#*#Scale#)-(30*#Scale#))/3
FontColor = #Color#
FontSize = (10*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
DynamicVariables = 1

[MeasureNETOutUnit]
Meter = String
Text = MB/s
X = R
Y = (13*#Scale#)
FontColor = #SubColor#
FontSize = (5*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
DynamicVariables = 1

[MeasureNETIn]
Measure = NetIn
UpdateDivider = 20

[MeterNETInText]
Meter = String
Text = [MeasureNETIn:/1000000,0]
X = ([MeterNETIcon:X]+(30*#Scale#))
Y = (23.5*#Scale#)
FontColor = #Color#
FontSize = (10*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
DynamicVariables = 1

[MeterNETInUnit]
Meter = String
Text = MB/s
X = R
Y = (30*#Scale#)
FontColor = #SubColor#
FontSize = (5*#Scale#)
FontFace = Segoe UI
FontWeight = 500
AntiAlias = 1
